 REALM_STABILITY_TT_COMPONENTS:0 "#bold Components (top 2)#!\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_stats_component').GetValue, '(CFixedPoint)0' ), '@change_up_good_1! #color_green Ruler Stats: ', Select_CString( LessThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_stats_component').GetValue, '(CFixedPoint)0' ), '@change_down_bad_1! #color_red Ruler Stats: ', 'Ruler Stats: ' ))][Character.MakeScope.Var('riseandfall_rs_stats_component').GetValue|0]#!\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_vassals_component').GetValue, '(CFixedPoint)0' ), '@change_up_good_1! #color_green Vassal Relations: ', Select_CString( LessThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_vassals_component').GetValue, '(CFixedPoint)0' ), '@change_down_bad_1! #color_red Vassal Relations: ', 'Vassal Relations: ' ))][Character.MakeScope.Var('riseandfall_rs_vassals_component').GetValue|0]#!"
 REALM_STABILITY_TT_LEGITIMACY_MULT:0 "#bold Legitimacy Multiplier#!\n[Select_CString( LessThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_legitimacy_multiplier').GetValue, '(CFixedPoint)99' ), '@change_down_bad_1! #color_red Legitimacy: ', 'Legitimacy: ' )][Character.MakeScope.Var('riseandfall_rs_legitimacy_multiplier').GetValue|100]%#!"
 REALM_STABILITY_TT_WAR:0 "#bold Civil War & War History#!\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_realm_stability_civil_war_penalty').GetValue, '(CFixedPoint)0' ), '@change_down_bad_1! #color_red Civil war penalty: ', 'Civil war penalty: ' )][Character.MakeScope.Var('riseandfall_realm_stability_civil_war_penalty').GetValue|0]#!\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_war_penalty').GetValue, '(CFixedPoint)0' ), '@change_down_bad_1! #color_red War penalty: -', 'War penalty: ' )][Character.MakeScope.Var('riseandfall_war_penalty').GetValue|0]#!"
