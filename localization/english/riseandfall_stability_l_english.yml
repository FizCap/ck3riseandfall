 REALM_STABILITY_TT_STORY_MODE_TOOLTIP:0 "#bold Story Mode#!\nThe campaign director nudges major realms so the world plays more like a campaign: some powers are protected, some become rivals, and oversized peaceful blobs can be pushed toward drama."
 REALM_STABILITY_TT_STORY_PRESSURE_INPUTS_TOOLTIP:0 "#bold Director Notes#!\nThese are story conditions, not direct stability penalties. They explain why Story Mode is watching this realm. Only the red Collapse penalty and the Story Mode effect row are directly applied to stability."
 REALM_STABILITY_TT_STORY_ROLE_TOOLTIP:0 "#bold Role#!\nAnchor: protected realm that should stay viable.\nRival: kept strong enough to threaten nearby powers and prevent unchecked hegemonies.\nDeclining Power: large stable realm selected for collapse pressure.\nWildcard: unstable realm allowed to swing dramatically, with emergency support if the world is already in crisis.\nBackground: mostly left alone by the director."
 REALM_STABILITY_TT_WORLD_CLIMATE_TOOLTIP:0 "#bold World#!\nPeaceful means too many major realms are stable, so Story Mode may create drama.\nBalanced means no major correction is needed.\nUnstable or Crisis means the director gives more recovery help to prevent every realm from collapsing at once."
 REALM_STABILITY_TT_DYNAMIC_STORY_TOOLTIP:0 "#bold Effect#!\nThis is the current stability change from Story Mode. Positive values are protection or recovery help. Negative values are collapse pressure against selected blobs. Forced Story Mode can apply much harsher penalties to extreme late-game blobs, but the pressure must build over several years."
 REALM_STABILITY_TT_SUCCESSOR_GRACE_TOOLTIP:0 "#bold Successor Grace#!\nTemporary stability support for new realms created by realm splits, palace coups, or loyalist breakaways. It decays over time so the realm must eventually stand on its own."
 REALM_STABILITY_TT_STORY_PROTECTION_TOOLTIP:0 "#bold Story Role Support#!\nTemporary support from this realm's Story Mode role. For example, Rivals can receive support so they remain strong enough to challenge other powers."
 REALM_STABILITY_TT_STORY_RECOVERY_TOOLTIP:0 "#bold Crisis Recovery#!\nStory Mode recovery support for weak realms when the wider world is already unstable or in crisis."
 REALM_STABILITY_TT_REIGN_TENSION_TOOLTIP:0 "#bold Realm Tension#!\nBackground Story Mode pressure from a huge realm, a very long reign, or decades without succession. It does not directly choose an event."
 REALM_STABILITY_TT_STAGNATION_PRESSURE_TOOLTIP:0 "#bold Long Reign#!\nA qualitative warning from stagnation, entrenched elites, claimant resentment, and vassals waiting too long for political change. This can feed collapse pressure over time, but it is not directly subtracted from stability by itself."
 REALM_STABILITY_TT_ANCIENT_REGIME_TOOLTIP:0 "#bold Ancient Regime#!\nThis ruler has held together a major realm for an unusually long time. Story Mode is looking for believable cracks, especially in oversized or divided empires."
 REALM_STABILITY_TT_COMPLACENT_VASSALS_TOOLTIP:0 "#bold Complacent Vassals#!\nPowerful vassals in an old or oversized realm may become entitled and ambitious even at high opinion. Alliances with the ruler keep them from counting here. This can feed later Story Mode pressure."
 REALM_STABILITY_TT_COMPLACENT_VASSAL_PRESSURE_TOOLTIP:0 "#bold Vassal Ambition#!\nA qualitative warning from strong non-allied vassals, long-lived vassal rulers, and old imperial politics. This can feed collapse pressure over time, but it is not directly subtracted from stability by itself."
 REALM_STABILITY_TT_NO_RIVAL_PRESSURE_TOOLTIP:0 "#bold No Rival#!\nA qualitative warning for large stable realms with no non-allied neighboring power near their strength. Distant powers do not count as rivals. This can feed collapse pressure over time, but it is not directly subtracted from stability by itself."
 REALM_STABILITY_TT_COLLAPSE_PRESSURE_TOOLTIP:0 "#bold Collapse Penalty#!\nThis red number is the actual stability target penalty from Story Mode. It is produced from accumulated collapse pressure after scaling. In Dynamic Story Mode, the penalty is gentle. In Forced Story Mode, extreme stagnant blobs can be pushed much harder after sustained pressure from real blob conditions. The specific low-stability event is still chosen by normal RNG."
