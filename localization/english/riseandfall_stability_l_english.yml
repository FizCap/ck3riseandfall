 REALM_STABILITY_TT_DIFFICULTY:0 "#bold Difficulty Multiplier#!\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_difficulty_multiplier').GetValue, '(CFixedPoint)100' ), '@change_up_good_1! #color_green Difficulty multiplier: ', Select_CString( LessThan_CFixedPoint( Character.MakeScope.Var('riseandfall_rs_difficulty_multiplier').GetValue, '(CFixedPoint)100' ), '@change_down_bad_1! #color_red Difficulty multiplier: ', 'Difficulty multiplier: ' ))][Character.MakeScope.Var('riseandfall_rs_difficulty_multiplier').GetValue|100]%#!"
