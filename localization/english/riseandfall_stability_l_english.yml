 REALM_STABILITY_TT_TRACK_TITLE:0 "Stability Track"
 REALM_STABILITY_TT_NUMBERS:0 "Current: [Character.MakeScope.Var('riseandfall_realm_stability_score').GetValue|0]  /  Target: [Character.MakeScope.Var('riseandfall_realm_stability_target').GetValue|0]\n[Select_CString( GreaterThan_CFixedPoint( Character.MakeScope.Var('riseandfall_realm_stability_predicted_change').GetValue, '(CFixedPoint)0' ), '@change_up_good_1! #color_green Predicted this year: ', Select_CString( LessThan_CFixedPoint( Character.MakeScope.Var('riseandfall_realm_stability_predicted_change').GetValue, '(CFixedPoint)0' ), '@change_down_bad_1! #color_red Predicted this year: ', 'Predicted this year: ' ))][Character.MakeScope.Var('riseandfall_realm_stability_predicted_change').GetValue|0]#!"
