 REALM_STABILITY_TT_PREDICTED_TOOLTIP:0 "#bold Predicted Change#!\nThe expected yearly movement of this realm's stability after current bonuses and penalties are counted."
 REALM_STABILITY_TT_RISK_TOOLTIP:0 "#bold Event Risk#!\nThe yearly chance for low-stability events. Higher risk means the realm is more likely to suffer instability events if nothing improves."
 REALM_STABILITY_TT_TARGET_TOOLTIP:0 "#bold Target#!\nThe realm starts from a base equilibrium of 50, then adds the visible ruler, world, and realm rows below. Stability trends toward this final value over time."
 REALM_STABILITY_TT_RULER_SECTION_TOOLTIP:0 "#bold Ruler#!\nPersonal rule factors: ruler ability, legitimacy, temporary successor grace, puppet stability support, and succession-law conflict.\n\n#bold World Ruler Averages#!\n@skill_diplomacy_icon! Diplomacy: #V [GetGlobalVariable('riseandfall_avg_diplomacy').GetValue|0]#!   @skill_martial_icon! Martial: #V [GetGlobalVariable('riseandfall_avg_martial').GetValue|0]#!\n@skill_stewardship_icon! Stewardship: #V [GetGlobalVariable('riseandfall_avg_stewardship').GetValue|0]#!   @skill_intrigue_icon! Intrigue: #V [GetGlobalVariable('riseandfall_avg_intrigue').GetValue|0]#!\n@skill_learning_icon! Learning: #V [GetGlobalVariable('riseandfall_avg_learning').GetValue|0]#!"
 REALM_STABILITY_TT_WAR_SECTION_TOOLTIP:0 "#bold Civil War & War History#!\nRecent or ongoing wars reduce stability. Civil wars are especially damaging because they show the realm's political order is already breaking."
 REALM_STABILITY_TT_WORLD_RULES_SECTION_TOOLTIP:0 "#bold World & Rules#!\nGlobal rule settings and actual Story Mode stability changes. Yellow director warning scores are shown in the Story Mode box."
 REALM_STABILITY_TT_REALM_FACTORS_SECTION_TOOLTIP:0 "#bold Realm Factors#!\nRealm structure and conditions: vassal relations, realm size, powerful vassals, culture and faith cohesion, epidemics, partition, and succession shocks."
 REALM_STABILITY_TT_STATS_TOOLTIP:0 "#bold Ruler Stats#!\nCompared against the current world ruler averages:\n@skill_diplomacy_icon! Diplomacy: #V [GetGlobalVariable('riseandfall_avg_diplomacy').GetValue|0]#!   @skill_martial_icon! Martial: #V [GetGlobalVariable('riseandfall_avg_martial').GetValue|0]#!\n@skill_stewardship_icon! Stewardship: #V [GetGlobalVariable('riseandfall_avg_stewardship').GetValue|0]#!   @skill_intrigue_icon! Intrigue: #V [GetGlobalVariable('riseandfall_avg_intrigue').GetValue|0]#!\n@skill_learning_icon! Learning: #V [GetGlobalVariable('riseandfall_avg_learning').GetValue|0]#!"
