l_english:
  # Category / filter
  interaction_category_puppet_master:0 "Puppet Master"
  interaction_category_power_sharing:0 "Power Sharing"
  puppet_master_filter_tag_desc:0 "Puppet Master"

  # Puppet Master court position
  riseandfall_puppet_master_court_position:0 "Puppet Master"
  riseandfall_puppet_master_court_position_desc:0 "A shadow regent imposed through a Puppet Regency. This office is assigned automatically by script and receives 5% of the liege's monthly revenue."

  # Steal Gold
  riseandfall_steal_gold_interaction:0 "Steal Gold"
  riseandfall_steal_gold_interaction_desc:0 "Steal a portion of your liege's gold, transferring it to your treasury and draining puppet stability mana. This action has a 1-year cooldown."
  riseandfall_steal_gold_interaction_notification_text:0 "You redirect funds from [recipient.GetShortUINamePossessive] treasury."

  # Curry Favor
  riseandfall_curry_favor_interaction:0 "Curry Favor"
  riseandfall_curry_favor_interaction_desc:0 "Gain a Strong Favor Hook on your liege, allowing you to influence their decisions. Requires no existing hook and has a 1-year cooldown."
  riseandfall_curry_favor_interaction_notification_text:0 "You secure leverage over [recipient.GetShortUIName]."

  # Seize Liege Land
  riseandfall_seize_liege_land_interaction:0 "Seize Liege Land"
  riseandfall_seize_liege_land_interaction_desc:0 "Seize one eligible county outside your liege's capital duchy, along with a matching duchy or kingdom title when it strengthens your rightful sphere or raises your rank. This drains puppet stability mana and has a 5-year cooldown."
  riseandfall_seize_liege_land_interaction_notification_text:0 "You carve a new power base from [recipient.GetShortUINamePossessive] personal lands."

  # Overthrow Liege
  riseandfall_overthrow_liege_interaction:0 "Overthrow Liege"
  riseandfall_overthrow_liege_interaction_desc:0 "Usurp all titles held by your liege, transferring them to you. Requires liege stability below 30 and has a 1-year cooldown."
  riseandfall_overthrow_liege_interaction_notification_text:0 "You overthrow [recipient.GetShortUIName] and seize their lands."

  # Failure reasons
  riseandfall_no_existing_hook:0 "Cannot have an existing hook on the liege."
  riseandfall_liege_stability_below_30:0 "Liege's stability must be below 30."
  riseandfall_liege_stability_below_50:0 "Liege's stability must be below 50."
  riseandfall_liege_has_gold:0 "Liege must have more than 0 gold."
  riseandfall_no_low_stability_cooldown:0 "Liege is under low stability cooldown."
  riseandfall_puppet_regency_years_at_least_5:0 "Recipient must have served as puppet regent for at least 5 years."
  riseandfall_puppet_master_has_seizable_liege_land:0 "Your liege must personally hold an eligible county outside their capital duchy that either belongs in your de jure sphere or can raise your rank."

  # Steal Gold popup and notification
  riseandfall_steal_gold_popup_title:0 "Gold Stolen by Puppet Master"
  riseandfall_steal_gold_popup_desc:0 "Your puppet master has stolen a portion of your gold reserves."
  riseandfall_steal_gold_vassal_notification_title:0 "Liege's Gold Stolen"
  riseandfall_steal_gold_vassal_notification_desc:0 "Your liege's puppet master has stolen gold from them."

  # Curry Favor popup and notification
  riseandfall_curry_favor_popup_title:0 "Puppet Master Gains Favor"
  riseandfall_curry_favor_popup_desc:0 "Your puppet master has gained a strong favor hook on you."
  riseandfall_curry_favor_vassal_notification_title:0 "Liege Influenced by Puppet Master"
  riseandfall_curry_favor_vassal_notification_desc:0 "Your liege's puppet master has gained significant influence over them."

  # Seize Liege Land popup and notification
  riseandfall_seize_liege_land_popup_title:0 "Land Seized by Puppet Master"
  riseandfall_seize_liege_land_popup_desc:0 "Your puppet master has seized part of your personal domain to strengthen their own power base."
  riseandfall_seize_liege_land_vassal_notification_title:0 "Liege's Land Seized"
  riseandfall_seize_liege_land_vassal_notification_desc:0 "Your liege's puppet master has seized land from the ruler's personal domain."

  # Overthrow Liege popup and notification
  riseandfall_overthrow_liege_popup_title:0 "Overthrown by Puppet Master"
  riseandfall_overthrow_liege_popup_desc:0 "Your puppet master has overthrown you and seized your titles."
  riseandfall_overthrow_liege_vassal_notification_title:0 "Liege Overthrown"
  riseandfall_overthrow_liege_vassal_notification_desc:0 "Your liege has been overthrown by their puppet master."

  # Force Abdication (health-based)
  riseandfall_force_abdicate_interaction:0 "Force Abdication"
  riseandfall_force_abdicate_interaction_desc:0 "Force your liege to step down if their health is poor, transferring their titles to a chosen dynasty member (youngest unlanded child preferred)."
  riseandfall_force_abdicate_interaction_notification_text:0 "You force [recipient.GetShortUIName] to abdicate in favor of a chosen successor."

  riseandfall_force_abdicate_popup_title:0 "Liege Forced to Abdicate"
  riseandfall_force_abdicate_popup_desc:0 "Your puppet master has forced you to abdicate due to poor health. Their chosen successor will inherit titles."
  riseandfall_force_abdicate_vassal_notification_title:0 "Liege Abdication by Puppet Master"
  riseandfall_force_abdicate_vassal_notification_desc:0 "Your liege has been forced to abdicate by their puppet master due to poor health."

  # Claim Puppet Master Office
  riseandfall_claim_puppet_master_office_interaction:0 "Claim Puppet Master Office"
  riseandfall_claim_puppet_master_office_interaction_desc:0 "Assume the official Puppet Master court position while your liege's puppet regency is active. This action is only available when you are not already the office holder."
  riseandfall_claim_puppet_master_office_interaction_notification_text:0 "You claim the Puppet Master court position."

  riseandfall_claim_puppet_master_office_popup_title:0 "Puppet Master Office Claimed"
  riseandfall_claim_puppet_master_office_popup_desc:0 "Your puppet master has claimed the official Puppet Master court position."
  riseandfall_claim_puppet_master_office_vassal_notification_title:0 "Puppet Master Office Claimed"
  riseandfall_claim_puppet_master_office_vassal_notification_desc:0 "Your liege's puppet master has claimed the official court office."

  # Failure text for poor health check
  riseandfall_liege_has_poor_health:0 "Liege must have poor or worse health."
  riseandfall_puppet_master_diarch_only:0 "You must be the active diarch of your liege."
  # Failure text: only the active diarch may use Force Abdication
  riseandfall_force_abdicate_diarch_only:0 "You must be the active diarch of your liege."
  riseandfall_claim_puppet_master_office_diarch_only:0 "You must be the active diarch of your liege."
  riseandfall_claim_puppet_master_office_not_hired:0 "You must not already hold the Puppet Master office."
