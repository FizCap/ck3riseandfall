 riseandfall_browse_diadochi_targets:0 "Review Successor War Targets"
 riseandfall_browse_diadochi_targets_desc:0 "Open a compact browser that lists rulers you can currently attack with the [Concept( 'casus_belli', '$RISEANDFALL_DIADOCHI_CB_NAME|q$' )|E]. Selecting a target from the list declares the war directly using the validated Diadochi target title."
 riseandfall_browse_diadochi_targets_tooltip:0 "Browse legal Diadochi war targets."
 riseandfall_browse_diadochi_targets_confirm:0 "Open Browser"

 riseandfall_diadochi_browser.0001.t:0 "Successor War Targets"
 riseandfall_diadochi_browser.0001.desc:0 "These realms currently qualify for a [Concept( 'casus_belli', '$RISEANDFALL_DIADOCHI_CB_NAME|q$' )|E]. Select a ruler from the list to begin the war immediately against the validated successor title."
 riseandfall_diadochi_browser.0001.desc_none:0 "No rulers currently satisfy the full declaration checks. Truces, alliances, ongoing wars, or title-state mismatches can temporarily block this [casus_belli|E]."
 riseandfall_diadochi_browser.0001.desc_overflow:0 "More legal targets exist than this browser can show at once. Nearby and directly relevant successor realms are prioritized first."

