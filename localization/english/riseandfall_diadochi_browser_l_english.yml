 riseandfall_diadochi_browser.0002.t:0 "[rf_diadochi_browser_selected_title.GetNameNoTier]"
 riseandfall_diadochi_browser.0002.desc:0 "[rf_diadochi_browser_selected_ruler.GetShortUIName] currently holds an eligible Diadochi target: [rf_diadochi_browser_selected_title.GetName].\n\n#bold Military Strength with Allies#!\nYour side: #V [rf_diadochi_browser_attacker.MakeScope.Var('rf_diadochi_browser_self_strength').GetValue|0]#!\nTarget side: #V [ROOT.Char.MakeScope.Var('rf_diadochi_browser_target_strength').GetValue|0]#!\n\nUse the standard declare war flow from the ruler or title screen if you decide to act."
 riseandfall_diadochi_browser.0002.a:0 "Back to List"
 riseandfall_diadochi_browser.0002.a.tt:0 "Return to the current list of legal Successor State War targets."
 riseandfall_diadochi_browser.0002.b:0 "Close"
