l_english:
 riseandfall_browse_diadochi_targets:0 "Review Successor War Targets"
 riseandfall_browse_diadochi_targets_desc:0 "Open an informational browser that lists rulers you can currently target with the [Concept( 'casus_belli', '$RISEANDFALL_DIADOCHI_CB_NAME|q$' )|E]. The list does not declare war; it lets you inspect each eligible successor state first."
 riseandfall_browse_diadochi_targets_tooltip:0 "Review legal Diadochi war targets."
 riseandfall_browse_diadochi_targets_confirm:0 "Open Browser"

 riseandfall_diadochi_browser.0001.t:0 "Successor War Targets"
 riseandfall_diadochi_browser.0001.desc:0 "These realms currently qualify for a [Concept( 'casus_belli', '$RISEANDFALL_DIADOCHI_CB_NAME|q$' )|E]. Select a realm to inspect its ruler, target title, and military comparison. This browser will not declare war."
 riseandfall_diadochi_browser.0001.desc_none:0 "No rulers currently satisfy the full declaration checks. Truces, alliances, ongoing wars, or title-state mismatches can temporarily block this [casus_belli|E]."
 riseandfall_diadochi_browser.0001.desc_overflow:0 "More legal targets exist than this browser can show at once. The primary origin title, nearby states, and then other legal successor realms are prioritized."

 riseandfall_diadochi_browser.0001.a_1:0 "[rf_diadochi_browser_target_title_1.GetNameNoTier] - [rf_diadochi_browser_target_ruler_1.GetShortUINameNoTooltip]"
 riseandfall_diadochi_browser.0001.a_1.tt:0 "View [rf_diadochi_browser_target_ruler_1.GetShortUINameNoTooltip] and the eligible war target: [rf_diadochi_browser_target_title_1.GetName].\n\n#bold Military Strength with Allies#!\nYour side: #V [rf_diadochi_browser_attacker.MakeScope.Var('rf_diadochi_browser_self_strength').GetValue|0]#!\nTarget side: #V [rf_diadochi_browser_target_ruler_1.MakeScope.Var('rf_diadochi_browser_target_strength').GetValue|0]#!"
