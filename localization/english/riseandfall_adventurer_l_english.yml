 ADVENTURER_CHANCE_TT_FINAL:0 "#bold Final Chance#!\nCombined chance this character will launch an adventurer uprising:\n[Character.MakeScope.Var('rf_adventurer_final_chance').GetValue|1]%"
 ADVENTURER_CHANCE_TT_BASE:0 "#bold Base Components#!\nBase Chance: [Character.MakeScope.Var('rf_adventurer_base_chance').GetValue|1]%\nTrait Bonuses: +[Character.MakeScope.Var('rf_adventurer_trait_chance').GetValue|1]%\nIntrigue Bonus: +[Character.MakeScope.Var('intrigue_bonus').GetValue|1]%"
